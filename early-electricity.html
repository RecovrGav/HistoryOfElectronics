<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Early Electricity — History of Electronics</title>
  <link rel="stylesheet" href="styles.css">

<body>
  <canvas id="space"></canvas>

  <section class="hero-page" data-bg="https://upload.wikimedia.org/wikipedia/commons/3/3a/Volta_batteries.jpg">
    <div class="hero-content">
      <h1>Early Electricity</h1>
      <p class="hero-subtitle">From ancient observations to the first electrical devices</p>
    </div>
    <span class="scroll-hint" aria-hidden="true"></span>
  </section>

  <!-- TIMELINE COMPONENT: Early Electricity History -->
  <div class="timeline-container">
    <div class="timeline-stage">
      <div class="timeline-info">
        <!-- Information display: time + paragraph above timeline -->
        <div class="timeline-info-top">
          <div class="timeline-date"></div>
          <div class="timeline-info-separator"></div>
          <p class="timeline-paragraph"></p>
        </div>

        <!-- Main timeline track with edge points and data points -->
        <div class="timeline-track">
          <div class="timeline-edge-point start"></div>
          
          <div class="timeline-point" 
               data-date="600 BC" 
               data-title="Static Electricity" 
               data-image="https://i0.wp.com/wiscimuseum.org/wp-content/uploads/2020/04/Amber-Fur-BN2055.png"
               data-paragraph="Ancient Greeks discovered that rubbing amber with fur produced static electricity. This laid the foundation for understanding future electrical forces.">
          </div>

          <div class="timeline-point" 
               data-date="1600s" 
               data-title="William Gilbert's Studies" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/3/3e/William_Gilbert_45626i.jpg"
               data-paragraph="William Gilbert studied both magnetism and electricity, and he even coined the term 'electricity' from the Greek word for amber. He distinguished the differences between magnetic and electric forces.">
          </div>

          <div class="timeline-point" 
               data-date="1752" 
               data-title="Franklin's Research" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/8/87/Joseph_Siffrein_Duplessis_-_Benjamin_Franklin_-_Google_Art_Project.jpg"
               data-paragraph="In the 18th century, Benjamin Franklin conducted extensive research on electricty,and ultimately proved that lightning was a form of electricity by flying a kite in a thunderstorm. His groundbreaking experiments demonstrated that electricity existed in nature as a powerful force.">
          </div>

          <div class="timeline-point" 
               data-date="1800" 
               data-title="Volta's Electrical Battery" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/3/3a/Volta_batteries.jpg"
               data-paragraph="Alessandro Volta invented the first electrical battery, made from zinc and copper discs separated by salt water. This provided the first continuous source of electrical current, and was a huge help in advancing electrical research.">
          </div>

          <div class="timeline-point" 
               data-date="1819-1820" 
               data-title="Electromagnetism Discovery" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/C.A._Jensen_-_Portrait_of_the_Physicist_Hans_Christian_%C3%98rsted_-_KMS8176_-_Statens_Museum_for_Kunst.jpg/500px-C.A._Jensen_-_Portrait_of_the_Physicist_Hans_Christian_%C3%98rsted_-_KMS8176_-_Statens_Museum_for_Kunst.jpg"
               data-paragraph="Hans Christian Ørsted and André-Marie Ampère discovered that electric current produces a magnetic field, establishing the connection between electricity and magnetism. This breakthrough led to the development of electromagnets.">
          </div>

          <div class="timeline-point" 
               data-date="1831" 
               data-title="Faraday's Electromagnetic Induction" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/8/88/M_Faraday_Th_Phillips_oil_1842.jpg"
               data-paragraph="Michael Faraday, who previously invented the electric motor, discovered electromagnetic induction, showing that changing magnetic fields could produce electricity. This principle became the basis for generators and transformers.">
          </div>

          <div class="timeline-edge-point end"></div>
        </div>

        <!-- Information display: image + title below timeline -->
        <div class="timeline-info-bottom">
          <h2 class="timeline-title"></h2>
          <img class="timeline-image" src="" alt="Timeline point image">
        </div>
      </div>
    </div>
  </div>
    <section class="category-grid" aria-label="Main categories">
        <div class="card squircle" data-target="communications.html" data-bg="https://source.unsplash.com/collection/888146/1600x1200" style="--img:url('https://source.unsplash.com/collection/888146/800x800')">
          <div class="card-img"></div>
          <div class="card-label">Communications</div>
        </div>

        <div class="card squircle" data-target="computers.html" data-bg="https://source.unsplash.com/collection/190727/1600x1200" style="--img:url('https://source.unsplash.com/collection/190727/800x800')">
          <div class="card-img"></div>
          <div class="card-label">Computers</div>
        </div>
    </section>
