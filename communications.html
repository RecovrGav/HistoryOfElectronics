  <section class="hero-page" data-bg="https://source.unsplash.com/collection/888146/1600x1200">
    <div class="hero-content">
      <h1>Communications</h1>
      <p class="hero-subtitle">From telegraph to wireless: Revolutionary communication technologies</p>
    </div>
    <span class="scroll-hint" aria-hidden="true"></span>
  </section>

  <div class="timeline-container">
    <div class="timeline-stage">
      <div class="timeline-info">
        <div class="timeline-info-top">
          <div class="timeline-date"></div>
          <div class="timeline-info-separator"></div>
          <p class="timeline-paragraph"></p>
        </div>

        <div class="timeline-track">
          <div class="timeline-edge-point start"></div>
          
          <div class="timeline-point" 
               data-date="1844" 
               data-title="Electric Telegraph" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/9/92/Morse_code_diagram.png"
               data-paragraph="Samuel Morse perfected the telegraph, enabling long-distance electrical transmission of messages using Morse code. It was the first practical application of electricity for communication. Britain used it to manage its colonial empire, and both sides of the U.S. Civil War relied on it for battlefield orders.">
          </div>

          <div class="timeline-point" 
               data-date="1876" 
               data-title="Telephone Invention" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/1/16/Telephone-Replica.jpg"
               data-paragraph="Alexander Graham Bell patented the telephone, allowing voice transmission over electrical wires. This revolutionary device replaced the telegraph for most communication needs. By WWI, telephone networks connected the military command centers of every major power, allowing armies to be called up and orders given faster than ever before.">
          </div>

          <div class="timeline-point" 
               data-date="1895" 
               data-title="Wireless Telegraphy" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/a/a5/Guglielmo_Marconi.jpg"
               data-paragraph="Guglielmo Marconi successfully demonstrated wireless transmission of electromagnetic signals. During WWI, British intelligence intercepted a German radio message called the Zimmermann Telegram — a secret plan to get Mexico to attack the U.S. — which helped pull America into the war.">
          </div>

          <div class="timeline-point" 
               data-date="1915" 
               data-title="WWI Military Communications" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/8/8e/Telephone_operators_in_France%2C_1918.jpg"
               data-paragraph="WWI was the first war where electronic communication played a central role. One of Britain's first moves was cutting Germany's undersea telegraph cables, forcing Germany to use radio — which Britain could listen in on. Both sides ran telephone lines along the trenches, though these were often cut during battles.">
          </div>

          <div class="timeline-point" 
               data-date="1920s" 
               data-title="Radio Broadcasting" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/5/54/Marconi-Telefunken_1924.jpg"
               data-paragraph="Commercial radio broadcasting began, enabling one-to-many communication. Radio stations transmitted news, music, and entertainment to millions of households simultaneously. In the 1930s, Hitler and Mussolini used state-controlled radio to spread propaganda to millions of people at once, helping build support for their regimes.">
          </div>

          <div class="timeline-point" 
               data-date="1940s" 
               data-title="WWII Signals Intelligence" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/5/5d/Bombe-rebuild.jpg"
               data-paragraph="Allied codebreakers at Bletchley Park cracked Germany's Enigma cipher machine, letting the Allies read German military plans throughout WWII. Breaking Japan's naval codes helped the U.S. win the Battle of Midway (1942), a turning point in the Pacific. The war showed that cracking enemy communications could be just as important as winning battles.">
          </div>

          <div class="timeline-point" 
               data-date="1956" 
               data-title="Transatlantic Telephone Cable" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/f/f1/TAT-1_cable_map.png"
               data-paragraph="The first transatlantic telephone cable TAT-1 connected North America and Europe, enabling intercontinental telephone conversations and marking a major milestone in global communications.">
          </div>

          <div class="timeline-point" 
               data-date="1962" 
               data-title="Satellite Communication" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/5/5f/Telstar_satellite.jpg"
               data-paragraph="Telstar became the first active communications satellite, transmitting television signals across the Atlantic Ocean. After the Cuban Missile Crisis that same year, the U.S. and USSR set up a direct hotline using satellite communication to avoid accidental nuclear war through miscommunication.">
          </div>

          <div class="timeline-point" 
               data-date="1973" 
               data-title="Mobile Phone Concept" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/8/86/Motorola_DynaTAC.jpg"
               data-paragraph="Martin Cooper at Motorola made the first mobile phone call, using a large prototype weighing 2.5 kg. This initiated the transformation of wireless communications into a personal technology.">
          </div>

          <div class="timeline-point" 
               data-date="1992" 
               data-title="Text Messaging Revolution" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/9/95/Sms_on_mobile.jpg"
               data-paragraph="SMS (Short Message Service) enabled text communication on mobile phones. Despite being initially underutilized, it became the most widely used communication method of the 2000s.">
          </div>

          <div class="timeline-edge-point end"></div>
        </div>

        <div class="timeline-info-bottom">
          <h2 class="timeline-title"></h2>
          <img class="timeline-image" src="" alt="Timeline point image">
        </div>
      </div>
    </div>
  </div>
