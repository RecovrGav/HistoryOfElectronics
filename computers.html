  <section class="hero-page" data-bg="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Colossus.jpg/1280px-Colossus.jpg">
    <div class="hero-content">
      <h1>Computers</h1>
      <p class="hero-subtitle">The evolution from mechanical calculators to modern computing</p>
    </div>
    <span class="scroll-hint" aria-hidden="true"></span>
  </section>

  <div class="timeline-container">
    <div class="timeline-stage">
      <div class="timeline-info">
        <div class="timeline-info-top">
          <div class="timeline-date"></div>
          <div class="timeline-info-separator"></div>
          <p class="timeline-paragraph"></p>
        </div>

        <div class="timeline-track">
          <div class="timeline-edge-point start"></div>
          
          <div class="timeline-point" 
               data-date="1822" 
               data-title="Babbage's Difference Engine" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/0/09/050114_2529_difference.jpg"
               data-paragraph="Charles Babbage designed the Difference Engine, a mechanical calculator for computing polynomial functions. Though never fully built during his lifetime, it laid the groundwork for modern computing. His collaborator Ada Lovelace wrote what is considered the first computer algorithm.">
          </div>

          <div class="timeline-point" 
               data-date="1890" 
               data-title="Hollerith Tabulating Machine" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/f/f7/Early_SSA_accounting_operations.jpg"
               data-paragraph="Herman Hollerith's electric tabulating machine used punched cards to process data, completing the 1890 U.S. Census in under a year instead of seven. His company eventually became IBM, whose machines were later used by the Nazi government to help manage records during the Holocaust.">
          </div>

          <div class="timeline-point" 
               data-date="1941" 
               data-title="Konrad Zuse's Z3" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/a/a3/Z3_Deutsches_Museum_b.jpg"
               data-paragraph="Konrad Zuse completed the Z3, the world's first programmable electromechanical computer. It used binary arithmetic and could be programmed with a punched tape.">
          </div>

          <div class="timeline-point" 
               data-date="1946" 
               data-title="ENIAC" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/1/16/Classic_shot_of_the_ENIAC.jpg"
               data-paragraph="ENIAC was built by the U.S. Army to calculate artillery tables during WWII, and later used for hydrogen bomb calculations. Its programming team was entirely made up of women, including Jean Jennings and Frances Bilas - roles that were largely taken away from women once the war ended.">
          </div>

          <div class="timeline-point" 
               data-date="1957" 
               data-title="Sputnik & the Computing Arms Race" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/%D0%9F%D0%B5%D1%80%D0%B2%D1%8B%D0%B9_%D0%B2_%D0%BC%D0%B8%D1%80%D0%B5_%D0%B8%D1%81%D0%BA%D1%83%D1%81%D1%81%D1%82%D0%B2%D0%B5%D0%BD%D0%BD%D1%8B%D0%B9_%D1%81%D0%BF%D1%83%D1%82%D0%BD%D0%B8%D0%BA_%D0%97%D0%B5%D0%BC%D0%BB%D0%B8.jpg/1920px-%D0%9F%D0%B5%D1%80%D0%B2%D1%8B%D0%B9_%D0%B2_%D0%BC%D0%B8%D1%80%D0%B5_%D0%B8%D1%81%D0%BA%D1%83%D1%81%D1%81%D1%82%D0%B2%D0%B5%D0%BD%D0%BD%D1%8B%D0%B9_%D1%81%D0%BF%D1%83%D1%82%D0%BD%D0%B8%D0%BA_%D0%97%D0%B5%D0%BC%D0%BB%D0%B8.jpg"
               data-paragraph="When the Soviet Union launched Sputnik, the U.S. responded by creating DARPA to fund advanced research. DARPA later built ARPANET, the direct predecessor to the internet. Cold War competition between the U.S. and USSR was a major reason the digital age developed as fast as it did.">
          </div>

          <div class="timeline-point" 
               data-date="1971" 
               data-title="Intel 4004 Microprocessor" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Chip_layout_from_the_development_phase_of_the_Intel_4004_from_1971%2C_the_first_microprocessor_of_the_world_%28cropped_and_edited_image%29.jpg/1920px-Chip_layout_from_the_development_phase_of_the_Intel_4004_from_1971%2C_the_first_microprocessor_of_the_world_%28cropped_and_edited_image%29.jpg"
               data-paragraph="Intel released the 4004, the first commercially available microprocessor. This single chip integrated thousands of transistors, making personal computers and modern electronics possible.">
          </div>

          <div class="timeline-point" 
               data-date="1985" 
               data-title="Personal Computers Boom" 
               data-image="https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/IBM_PC_XT_5160.JPG/960px-IBM_PC_XT_5160.JPG"
               data-paragraph="Personal computers became affordable and accessible to consumers. The Soviet government tightly restricted personal computers and information technology, which left the USSR falling further behind the West economically - one of several pressures that led to its collapse in 1991.">
          </div>

          <div class="timeline-point" 
               data-date="1991" 
               data-title="World Wide Web" 
               data-image="https://winworldpc.com/res/img/screenshots/9f194b8570df1ea5819d0e630392ca16df5f8bba1d20654cf492a5a2994aa2ff.png"
               data-paragraph="Tim Berners-Lee released the World Wide Web, transforming how people share and access information. The internet revolution accelerated the evolution of computing.">
          </div>

          <div class="timeline-edge-point end"></div>
        </div>

        <div class="timeline-info-bottom">
          <h2 class="timeline-title"></h2>
          <img class="timeline-image" src="" alt="Timeline point image">
        </div>
      </div>
    </div>
  </div>
